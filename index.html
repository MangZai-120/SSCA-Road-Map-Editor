<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SSCA思路编辑器</title>
<script>try{if(localStorage.getItem("ssca_idea_editor_v1_theme")==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}</script>
<style>
  :root {
    --bg: #eef1f7;
    --grid: #d4d9e6;
    --panel: #ffffff;
    --ink: #2b2f3a;
    --muted: #8b93a7;
    --accent: #6c5ce7;
    --accent-soft: #ece9ff;
    --edge: #7c6cf0;
    --edge-sel: #e74c8b;
    --node-border: #e2e6f0;
    --btn-bg: #ffffff;
    --input-bg: #fafbff;
    --hint-bg: rgba(255, 255, 255, .75);
    --shadow: 0 4px 14px rgba(40, 46, 70, .12);
    --shadow-strong: 0 8px 26px rgba(70, 60, 160, .28);
  }
  :root[data-theme="dark"] {
    --bg: #181a21;
    --grid: #2b2f3a;
    --panel: #242833;
    --ink: #dfe3ee;
    --muted: #8b91a3;
    --accent: #9183f3;
    --accent-soft: #2f2b48;
    --edge: #9788f5;
    --edge-sel: #f06aa0;
    --node-border: #363b48;
    --btn-bg: #2b303c;
    --input-bg: #1d2028;
    --hint-bg: rgba(36, 40, 51, .82);
    --shadow: 0 4px 14px rgba(0, 0, 0, .45);
    --shadow-strong: 0 8px 26px rgba(0, 0, 0, .6);
  }
  body, #toolbar, #inspector, .node, .btn, .field input, .field textarea, #viewport, #help .card {
    transition: background-color .25s ease, border-color .25s ease, color .25s ease;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
    color: var(--ink); background: var(--bg);
    -webkit-user-select: none; user-select: none;
  }
  #app { display: flex; flex-direction: column; height: 100%; }

  #toolbar {
    height: 52px; flex: 0 0 52px; display: flex; align-items: center;
    padding: 0 16px; gap: 10px; background: var(--panel);
    border-bottom: 1px solid var(--node-border); box-shadow: var(--shadow); z-index: 30;
  }
  #toolbar .brand { font-weight: 700; font-size: 17px; letter-spacing: .5px; }
  #toolbar .brand b { color: var(--accent); }
  #toolbar .spacer { flex: 1; }
  .btn {
    border: 1px solid var(--node-border); background: var(--btn-bg); color: var(--ink);
    padding: 7px 13px; border-radius: 8px; cursor: pointer; font-size: 13px;
    transition: .15s; white-space: nowrap;
  }
  .btn:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { filter: brightness(1.08); color: #fff; }
  .btn.danger:hover { background: #fde8ee; border-color: var(--edge-sel); color: var(--edge-sel); }
  #saveTag { font-size: 12px; color: var(--muted); margin-left: 4px; min-width: 64px; }

  #main { flex: 1; display: flex; min-height: 0; }
  #viewport {
    flex: 1; position: relative; overflow: hidden; cursor: grab;
    background-color: var(--bg);
    background-image: radial-gradient(var(--grid) 1.3px, transparent 1.3px);
    background-size: 26px 26px; background-position: 0 0;
  }
  #viewport.panning { cursor: grabbing; }
  #viewport.connecting { cursor: crosshair; }
  #world { position: absolute; left: 0; top: 0; transform-origin: 0 0; will-change: transform; }
  #edges { position: absolute; left: 0; top: 0; overflow: visible; width: 1px; height: 1px; pointer-events: none; }
  #edges path.hit { stroke: transparent; stroke-width: 16; fill: none; pointer-events: stroke; cursor: pointer; }
  #edges path.wire { fill: none; stroke: var(--edge); stroke-width: 2.4; pointer-events: none;
    filter: drop-shadow(0 1px 1px rgba(80,70,160,.15)); transition: stroke .12s; }
  #edges path.wire.sel { stroke: var(--edge-sel); stroke-width: 3.2; }
  #edges path.temp { fill: none; stroke: var(--accent); stroke-width: 2.4; stroke-dasharray: 7 6; opacity: .85; pointer-events: none; }

  .node {
    position: absolute; width: 208px; background: var(--panel);
    border: 1.5px solid var(--node-border); border-radius: 13px;
    box-shadow: var(--shadow); cursor: grab; overflow: hidden;
    transition: box-shadow .15s, border-color .15s, transform .04s;
  }
  .node:hover { box-shadow: var(--shadow-strong); }
  .node.sel { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft), var(--shadow-strong); }
  .node.linktarget { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
  .node .bar { height: 6px; background: var(--accent); }
  .node .body { padding: 11px 13px 12px; }
  .node .t-big { font-size: 15px; font-weight: 700; line-height: 1.3; word-break: break-word; }
  .node .t-small { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.4; word-break: break-word; }
  .node .dot { position: absolute; right: 9px; top: 11px; width: 9px; height: 9px; border-radius: 50%;
    background: var(--accent); opacity: .5; }
  .node .rz { position: absolute; z-index: 3; }
  .node .rz-e { top: 0; right: 0; width: 8px; height: 100%; cursor: ew-resize; }
  .node .rz-s { left: 0; bottom: 0; height: 8px; width: 100%; cursor: ns-resize; }
  .node .rz-se { right: 0; bottom: 0; width: 16px; height: 16px; cursor: nwse-resize; }
  .node .rz-se::after { content: ""; position: absolute; right: 4px; bottom: 4px; width: 7px; height: 7px;
    border-right: 2px solid var(--muted); border-bottom: 2px solid var(--muted); opacity: 0; transition: opacity .15s; }
  .node:hover .rz-se::after, .node.sel .rz-se::after { opacity: 1; }

  #inspector {
    flex: 0 0 320px; background: var(--panel); border-left: 1px solid var(--node-border);
    box-shadow: -2px 0 12px rgba(40,46,70,.06); display: flex; flex-direction: column; z-index: 20;
  }
  #inspector .head { padding: 15px 18px 10px; border-bottom: 1px solid var(--node-border); }
  #inspector .head h3 { margin: 0; font-size: 15px; }
  #inspector .head p { margin: 6px 0 0; font-size: 12px; color: var(--muted); }
  #inspector .content { flex: 1; overflow-y: auto; padding: 16px 18px; }
  .field { margin-bottom: 15px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
  .field input, .field textarea {
    width: 100%; border: 1.5px solid var(--node-border); border-radius: 9px; padding: 9px 11px;
    font: inherit; font-size: 13px; color: var(--ink); background: var(--input-bg); resize: vertical;
    -webkit-user-select: text; user-select: text;
  }
  .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); background: var(--panel); }
  .field textarea { min-height: 150px; line-height: 1.55; }
  .insp-actions { display: flex; gap: 8px; margin-top: 4px; }
  .insp-actions .btn { flex: 1; text-align: center; }

  .empty { color: var(--muted); font-size: 13px; line-height: 1.9; }
  .empty .k {
    display: inline-block; background: var(--accent-soft); color: var(--accent);
    border-radius: 5px; padding: 1px 7px; font-size: 12px; font-weight: 600; margin: 0 1px;
  }
  .empty h4 { color: var(--ink); margin: 0 0 8px; font-size: 13px; }
  .empty ul { padding-left: 4px; list-style: none; margin: 0 0 16px; }
  .empty li { margin: 7px 0; }

  #help { position: absolute; inset: 0; background: rgba(30,32,45,.45); display: none;
    align-items: center; justify-content: center; z-index: 50; }
  #help.show { display: flex; }
  #help .card { background: var(--panel); border-radius: 16px; padding: 26px 30px; width: 460px; max-width: 90%;
    box-shadow: var(--shadow-strong); }
  #help .card h2 { margin: 0 0 14px; font-size: 19px; }
  #help .card h2 b { color: var(--accent); }
  #help .card ul { padding-left: 0; list-style: none; margin: 0 0 18px; }
  #help .card li { margin: 10px 0; font-size: 13.5px; line-height: 1.5; }
  #help .card .k { display: inline-block; background: var(--accent-soft); color: var(--accent);
    border-radius: 6px; padding: 2px 8px; font-size: 12.5px; font-weight: 600; }
  #toast { position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #2b2f3a; color: #fff; padding: 9px 18px; border-radius: 22px; font-size: 13px;
    opacity: 0; transition: .25s; z-index: 60; pointer-events: none; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #hint { position: absolute; left: 16px; bottom: 14px; font-size: 12px; color: var(--muted);
    background: var(--hint-bg); padding: 5px 11px; border-radius: 16px; pointer-events: none; }
  #mapMgr { position: absolute; inset: 0; background: rgba(30,32,45,.45); display: none;
    align-items: center; justify-content: center; z-index: 50; }
  #mapMgr.show { display: flex; }
  #mapMgr .card { background: var(--panel); border-radius: 16px; padding: 22px 24px; width: 540px;
    max-width: 92%; max-height: 80%; display: flex; flex-direction: column; box-shadow: var(--shadow-strong); }
  .mm-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .mm-head h2 { margin: 0; font-size: 18px; }
  .mm-list { flex: 1; overflow-y: auto; margin-bottom: 14px; min-height: 80px; }
  .mm-item { display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 12px 14px; border: 1.5px solid var(--node-border); border-radius: 11px; margin-bottom: 9px;
    background: var(--btn-bg); }
  .mm-item.current { border-color: var(--accent); background: var(--accent-soft); }
  .mm-info { min-width: 0; }
  .mm-name { font-size: 14.5px; font-weight: 600; color: var(--ink); word-break: break-word; }
  .mm-name .cur-tag { font-size: 11px; color: #fff; background: var(--accent); border-radius: 5px;
    padding: 1px 7px; margin-left: 7px; font-weight: 600; }
  .mm-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .mm-actions { display: flex; gap: 6px; flex: 0 0 auto; }
  .mm-actions .btn { padding: 6px 11px; font-size: 12.5px; }
  #mapBtn { font-weight: 600; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #inputModal { position: absolute; inset: 0; background: rgba(30,32,45,.45); display: none;
    align-items: center; justify-content: center; z-index: 60; }
  #inputModal.show { display: flex; }
  #inputModal .card { background: var(--panel); border-radius: 14px; padding: 20px 22px; width: 380px;
    max-width: 90%; box-shadow: var(--shadow-strong); }
  #inputModal h3 { margin: 0 0 12px; font-size: 15px; }
  #inputModal input { width: 100%; border: 1.5px solid var(--node-border); border-radius: 9px; padding: 9px 11px;
    font: inherit; font-size: 14px; color: var(--ink); background: var(--input-bg);
    -webkit-user-select: text; user-select: text; }
  #inputModal input:focus { outline: none; border-color: var(--accent); background: var(--panel); }
  .im-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <div class="brand">SSCA<b>思路</b>编辑器</div>
    <button class="btn" id="mapBtn" title="切换 / 管理导图">📁 <span id="mapName">导图</span> ▾</button>
    <span id="saveTag">已保存</span>
    <div class="spacer"></div>
    <button class="btn primary" id="addBtn">＋ 新建节点</button>
    <button class="btn" id="fitBtn">居中视图</button>
    <button class="btn" id="exportBtn">导出</button>
    <button class="btn" id="importBtn">导入</button>
    <button class="btn danger" id="clearBtn">清空</button>
    <button class="btn" id="helpBtn">帮助</button>
    <button class="btn" id="themeBtn" title="切换白天/黑夜">🌙 黑夜</button>
    <input type="file" id="fileInput" accept="application/json" style="display:none" />
  </div>

  <div id="main">
    <div id="viewport">
      <div id="world">
        <svg id="edges"></svg>
      </div>
      <div id="hint">左键拖空白移动画布 ・ 右键从节点拖到另一节点连线 ・ 双击空白新建节点</div>
    </div>

    <div id="inspector">
      <div class="head">
        <h3 id="inspTitle">操作栏</h3>
        <p id="inspSub">选中一个节点以查看 / 编辑备注</p>
      </div>
      <div class="content" id="inspContent"></div>
    </div>
  </div>

  <div id="help">
    <div class="card">
      <h2>SSCA<b>思路</b>编辑器 · 使用说明</h2>
      <ul>
        <li><span class="k">左键拖空白</span> 移动整张画布（平移）</li>
        <li><span class="k">左键拖节点</span> 移动该节点位置</li>
        <li><span class="k">右键按住节点 → 拖到另一节点</span> 用曲线把两者连接起来</li>
        <li><span class="k">单击节点</span> 右侧操作栏显示大标题 / 小标题 / 备注，可编辑</li>
        <li><span class="k">双击空白</span> 在此处新建一个节点</li>
        <li><span class="k">单击连线</span> 选中连线，按 <span class="k">Delete</span> 删除</li>
        <li><span class="k">滚轮</span> 缩放画布 ・ <span class="k">Delete</span> 删除选中节点 ・ <span class="k">Esc</span> 取消</li>
      </ul>
      <button class="btn primary" id="helpClose" style="width:100%">开始使用</button>
    </div>
  </div>

  <div id="mapMgr">
    <div class="card">
      <div class="mm-head">
        <h2>📁 我的导图</h2>
        <button class="btn primary" id="newMapBtn">＋ 新建导图</button>
      </div>
      <div class="mm-list" id="mapList"></div>
      <button class="btn" id="mapMgrClose" style="width:100%;margin-top:4px">关闭</button>
    </div>
  </div>

  <div id="inputModal">
    <div class="card">
      <h3 id="imTitle">输入</h3>
      <input type="text" id="imInput" autocomplete="off" spellcheck="false" />
      <div class="im-actions">
        <button class="btn" id="imCancel">取消</button>
        <button class="btn primary" id="imOk">确定</button>
      </div>
    </div>
  </div>
  <div id="toast"></div>
</div>

<script>
"use strict";
(function () {
  const NODE_W = 208, GRID = 26;
  const viewport = document.getElementById("viewport");
  const world    = document.getElementById("world");
  const svg       = document.getElementById("edges");
  const inspContent = document.getElementById("inspContent");
  const inspTitle = document.getElementById("inspTitle");
  const inspSub   = document.getElementById("inspSub");
  const saveTag   = document.getElementById("saveTag");

  const STORE_KEY = "ssca_idea_editor_v1";
  const MAPS_KEY = "ssca_idea_maps";
  const CUR_KEY = "ssca_idea_current";
  const mapKey = id => "ssca_idea_map_" + id;

  function freshState() {
    return { nextId: 1, nodes: [], edges: [], pan: { x: 120, y: 90 }, zoom: 1 };
  }
  let state = freshState();
  let maps = [];
  let currentMapId = null;
  let selNode = null, selEdge = null;
  const nodeEls = {};

  function screenToWorld(sx, sy) {
    const r = viewport.getBoundingClientRect();
    return {
      x: (sx - r.left - state.pan.x) / state.zoom,
      y: (sy - r.top  - state.pan.y) / state.zoom,
    };
  }
  function nodeSize(n) {
    const el = nodeEls[n.id];
    return { w: el ? el.offsetWidth : NODE_W, h: el ? el.offsetHeight : 64 };
  }
  function nodeCenter(n) {
    const s = nodeSize(n);
    return { x: n.x + s.w / 2, y: n.y + s.h / 2 };
  }

  function applyWorld() {
    world.style.transform = `translate(${state.pan.x}px, ${state.pan.y}px) scale(${state.zoom})`;
    viewport.style.backgroundPosition = `${state.pan.x}px ${state.pan.y}px`;
    viewport.style.backgroundSize = `${GRID * state.zoom}px ${GRID * state.zoom}px`;
  }

  function curve(p1, p2) {
    const off = Math.max(46, Math.abs(p2.x - p1.x) * 0.5);
    return `M ${p1.x} ${p1.y} C ${p1.x + off} ${p1.y}, ${p2.x - off} ${p2.y}, ${p2.x} ${p2.y}`;
  }

  function syncNodes() {
    for (const id in nodeEls) {
      if (!state.nodes.find(n => String(n.id) === String(id))) {
        nodeEls[id].remove(); delete nodeEls[id];
      }
    }
    for (const n of state.nodes) {
      let el = nodeEls[n.id];
      if (!el) {
        el = document.createElement("div");
        el.className = "node";
        el.dataset.id = n.id;
        el.innerHTML = '<div class="bar"></div><span class="dot"></span>' +
                       '<div class="body"><div class="t-big"></div><div class="t-small"></div></div>' +
                       '<div class="rz rz-e"></div><div class="rz rz-s"></div><div class="rz rz-se"></div>';
        world.appendChild(el);
        nodeEls[n.id] = el;
      }
      el.style.left = n.x + "px";
      el.style.top  = n.y + "px";
      el.style.width = (n.w || NODE_W) + "px";
      el.style.height = n.h ? n.h + "px" : "";
      const big = el.querySelector(".t-big");
      const small = el.querySelector(".t-small");
      big.textContent = n.big || "未命名";
      small.textContent = n.small || "（小标题）";
      el.classList.toggle("sel", selNode && selNode.id === n.id);
    }
  }

  let tempWire = null;
  function renderEdges() {
    let html = "";
    for (const e of state.edges) {
      const a = state.nodes.find(n => n.id === e.from);
      const b = state.nodes.find(n => n.id === e.to);
      if (!a || !b) continue;
      const d = curve(nodeCenter(a), nodeCenter(b));
      const sel = selEdge && selEdge.id === e.id ? " sel" : "";
      html += `<path class="hit" data-edge="${e.id}" d="${d}"></path>`;
      html += `<path class="wire${sel}" data-edge="${e.id}" d="${d}"></path>`;
    }
    if (tempWire) {
      const a = state.nodes.find(n => n.id === tempWire.from);
      if (a) html += `<path class="temp" d="${curve(nodeCenter(a), tempWire.to)}"></path>`;
    }
    svg.innerHTML = html;
  }

  function draw() { applyWorld(); syncNodes(); renderEdges(); }

  function renderInspector() {
    if (selNode) {
      inspTitle.textContent = "编辑节点";
      inspSub.textContent = "修改标题与备注，自动保存";
      inspContent.innerHTML =
        '<div class="field"><label>大标题（实例名字）</label><input id="fBig" type="text" placeholder="例如：使魔·火球术"></div>' +
        '<div class="field"><label>小标题（大致说法）</label><input id="fSmall" type="text" placeholder="例如：消耗法力的远程火球"></div>' +
        '<div class="field"><label>备注</label><textarea id="fNote" placeholder="在这里写详细思路 / 数值 / 待办……"></textarea></div>' +
        '<div class="insp-actions">' +
          '<button class="btn" id="dupBtn">复制节点</button>' +
          '<button class="btn danger" id="delBtn">删除节点</button>' +
        '</div>';
      const fBig = document.getElementById("fBig");
      const fSmall = document.getElementById("fSmall");
      const fNote = document.getElementById("fNote");
      fBig.value = selNode.big || "";
      fSmall.value = selNode.small || "";
      fNote.value = selNode.note || "";
      fBig.oninput   = () => { selNode.big = fBig.value; syncNodes(); scheduleSave(); };
      fSmall.oninput = () => { selNode.small = fSmall.value; syncNodes(); scheduleSave(); };
      fNote.oninput  = () => { selNode.note = fNote.value; scheduleSave(); };
      document.getElementById("delBtn").onclick = () => deleteNode(selNode);
      document.getElementById("dupBtn").onclick = () => duplicateNode(selNode);
    } else if (selEdge) {
      inspTitle.textContent = "连线";
      inspSub.textContent = "两个节点之间的关联";
      const a = state.nodes.find(n => n.id === selEdge.from);
      const b = state.nodes.find(n => n.id === selEdge.to);
      inspContent.innerHTML =
        `<div class="empty"><h4>已选中一条连线</h4>` +
        `<p><b>${(a&&a.big)||"?"}</b> → <b>${(b&&b.big)||"?"}</b></p></div>` +
        '<div class="insp-actions"><button class="btn danger" id="delEdge">删除连线</button></div>';
      document.getElementById("delEdge").onclick = () => deleteEdge(selEdge);
    } else {
      inspTitle.textContent = "操作栏";
      inspSub.textContent = "选中一个节点以查看 / 编辑备注";
      inspContent.innerHTML =
        '<div class="empty">' +
        '<h4>快速上手</h4><ul>' +
        '<li><span class="k">左键拖空白</span> 平移画布</li>' +
        '<li><span class="k">右键拖节点→节点</span> 曲线连接</li>' +
        '<li><span class="k">单击节点</span> 这里编辑备注</li>' +
        '<li><span class="k">双击空白</span> 新建节点</li>' +
        '</ul>' +
        `<p>当前：节点 ${state.nodes.length} 个 ・ 连线 ${state.edges.length} 条</p>` +
        '</div>';
    }
  }

  function select(node, edge) {
    selNode = node || null; selEdge = edge || null;
    syncNodes(); renderEdges(); renderInspector();
  }

  function addNode(wx, wy, big, small) {
    const n = { id: state.nextId++, x: wx - NODE_W / 2, y: wy - 30, w: NODE_W,
                big: big || "新节点", small: small || "点我编辑小标题", note: "" };
    state.nodes.push(n); save(); draw(); select(n); return n;
  }
  function duplicateNode(n) {
    const c = { id: state.nextId++, x: n.x + 28, y: n.y + 28, w: n.w || NODE_W,
                big: n.big, small: n.small, note: n.note };
    state.nodes.push(c); save(); draw(); select(c); toast("已复制节点");
  }
  function deleteNode(n) {
    state.nodes = state.nodes.filter(x => x.id !== n.id);
    state.edges = state.edges.filter(e => e.from !== n.id && e.to !== n.id);
    if (selNode && selNode.id === n.id) selNode = null;
    save(); draw(); renderInspector(); toast("已删除节点");
  }
  function deleteEdge(e) {
    state.edges = state.edges.filter(x => x.id !== e.id);
    if (selEdge && selEdge.id === e.id) selEdge = null;
    save(); draw(); renderInspector(); toast("已删除连线");
  }
  function connect(fromId, toId) {
    if (fromId === toId) return;
    if (state.edges.find(e => (e.from === fromId && e.to === toId) || (e.from === toId && e.to === fromId))) {
      toast("这两个节点已经连过了"); return;
    }
    state.edges.push({ id: "e" + (state.nextId++), from: fromId, to: toId });
    save(); renderEdges(); renderInspector(); toast("已连接");
  }

  let mode = "idle";
  let dragInfo = null;

  viewport.addEventListener("contextmenu", e => e.preventDefault());
  document.addEventListener("contextmenu", e => { const t = e.target; if (t && t.closest && t.closest("input, textarea")) return; e.preventDefault(); }, true);

  viewport.addEventListener("mousedown", e => {
    const nodeEl = e.target.closest(".node");
    const hitEdge = e.target.closest("path.hit");

    if (nodeEl) {
      const n = state.nodes.find(x => String(x.id) === nodeEl.dataset.id);
      if (!n) return;
      const rz = e.target.closest(".rz-e, .rz-s, .rz-se");
      if (e.button === 0 && rz) {
        select(n);
        const axis = rz.classList.contains("rz-e") ? "x" : rz.classList.contains("rz-s") ? "y" : "xy";
        mode = "resize";
        dragInfo = { node: n, axis: axis, startX: e.clientX, startY: e.clientY, startW: n.w || NODE_W, startH: n.h || nodeEl.offsetHeight };
        e.preventDefault();
        return;
      }
      if (e.button === 2) {
        mode = "connect";
        dragInfo = { from: n.id };
        tempWire = { from: n.id, to: screenToWorld(e.clientX, e.clientY) };
        viewport.classList.add("connecting");
        renderEdges();
        e.preventDefault();
      } else if (e.button === 0) {
        select(n);
        const w = screenToWorld(e.clientX, e.clientY);
        mode = "drag";
        dragInfo = { node: n, dx: w.x - n.x, dy: w.y - n.y, moved: false };
        nodeEl.style.cursor = "grabbing";
        nodeEl.parentNode.appendChild(nodeEl);
      }
      return;
    }

    if (e.button === 0) {
      if (hitEdge) {
        const e2 = state.edges.find(x => String(x.id) === hitEdge.dataset.edge);
        select(null, e2);
        return;
      }
      mode = "pan";
      dragInfo = { sx: e.clientX, sy: e.clientY, px: state.pan.x, py: state.pan.y, moved: false };
      viewport.classList.add("panning");
      select(null, null);
    }
  });

  window.addEventListener("mousemove", e => {
    if (mode === "pan") {
      state.pan.x = dragInfo.px + (e.clientX - dragInfo.sx);
      state.pan.y = dragInfo.py + (e.clientY - dragInfo.sy);
      dragInfo.moved = true;
      applyWorld();
    } else if (mode === "drag") {
      const w = screenToWorld(e.clientX, e.clientY);
      dragInfo.node.x = w.x - dragInfo.dx;
      dragInfo.node.y = w.y - dragInfo.dy;
      dragInfo.moved = true;
      const el = nodeEls[dragInfo.node.id];
      el.style.left = dragInfo.node.x + "px";
      el.style.top  = dragInfo.node.y + "px";
      renderEdges();
    } else if (mode === "resize") {
      const di = dragInfo;
      if (di.axis.indexOf("x") >= 0) di.node.w = Math.round(Math.max(150, Math.min(640, di.startW + (e.clientX - di.startX) / state.zoom)));
      if (di.axis.indexOf("y") >= 0) di.node.h = Math.round(Math.max(56, Math.min(640, di.startH + (e.clientY - di.startY) / state.zoom)));
      const el = nodeEls[di.node.id];
      el.style.width = di.node.w + "px";
      if (di.node.h) el.style.height = di.node.h + "px";
      renderEdges();
    } else if (mode === "connect") {
      tempWire.to = screenToWorld(e.clientX, e.clientY);
      const overEl = document.elementFromPoint(e.clientX, e.clientY);
      const tgt = overEl && overEl.closest(".node");
      for (const id in nodeEls) nodeEls[id].classList.remove("linktarget");
      if (tgt && tgt.dataset.id !== String(dragInfo.from)) tgt.classList.add("linktarget");
      renderEdges();
    }
  });

  window.addEventListener("mouseup", e => {
    if (mode === "connect") {
      const overEl = document.elementFromPoint(e.clientX, e.clientY);
      const tgt = overEl && overEl.closest(".node");
      if (tgt) {
        const toId = state.nodes.find(x => String(x.id) === tgt.dataset.id);
        if (toId) connect(dragInfo.from, toId.id);
      }
      for (const id in nodeEls) nodeEls[id].classList.remove("linktarget");
      tempWire = null; renderEdges();
    } else if (mode === "drag") {
      const el = nodeEls[dragInfo.node.id];
      if (el) el.style.cursor = "grab";
      if (dragInfo.moved) save();
    } else if (mode === "resize") {
      save();
    } else if (mode === "pan") {
      if (dragInfo.moved) save();
    }
    mode = "idle"; dragInfo = null;
    viewport.classList.remove("panning", "connecting");
  });

  viewport.addEventListener("dblclick", e => {
    if (e.target.closest(".node") || e.target.closest("path.hit")) return;
    const w = screenToWorld(e.clientX, e.clientY);
    addNode(w.x, w.y);
  });

  viewport.addEventListener("wheel", e => {
    e.preventDefault();
    const r = viewport.getBoundingClientRect();
    const mx = e.clientX - r.left, my = e.clientY - r.top;
    const old = state.zoom;
    const next = Math.min(2.2, Math.max(0.35, old * (e.deltaY < 0 ? 1.1 : 1 / 1.1)));
    state.pan.x = mx - (mx - state.pan.x) * (next / old);
    state.pan.y = my - (my - state.pan.y) * (next / old);
    state.zoom = next;
    applyWorld(); save();
  }, { passive: false });

  window.addEventListener("keydown", e => {
    const typing = /^(INPUT|TEXTAREA)$/.test(document.activeElement.tagName);
    if (typing) return;
    if (e.key === "Delete" || e.key === "Backspace") {
      if (selNode) deleteNode(selNode);
      else if (selEdge) deleteEdge(selEdge);
    } else if (e.key === "Escape") {
      if (mode === "connect") { tempWire = null; renderEdges(); mode = "idle"; viewport.classList.remove("connecting"); }
      select(null, null);
    }
  });

  let saveTimer = null;
  function scheduleSave() { saveTag.textContent = "未保存…"; clearTimeout(saveTimer); saveTimer = setTimeout(save, 400); }
  function save() {
    clearTimeout(saveTimer);
    try { localStorage.setItem(mapKey(currentMapId), JSON.stringify(state)); saveTag.textContent = "已保存"; }
    catch (err) { saveTag.textContent = "保存失败"; }
  }
  function load() {
    try {
      const raw = localStorage.getItem(mapKey(currentMapId));
      if (raw) { const d = JSON.parse(raw); if (d && d.nodes) state = Object.assign(freshState(), d); }
    } catch (err) {}
  }

  document.getElementById("addBtn").onclick = () => {
    const r = viewport.getBoundingClientRect();
    const w = screenToWorld(r.left + r.width / 2, r.top + r.height / 2);
    addNode(w.x, w.y);
  };
  document.getElementById("fitBtn").onclick = () => {
    if (!state.nodes.length) { state.pan = { x: 120, y: 90 }; state.zoom = 1; applyWorld(); save(); return; }
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const n of state.nodes) {
      const s = nodeSize(n);
      minX = Math.min(minX, n.x); minY = Math.min(minY, n.y);
      maxX = Math.max(maxX, n.x + s.w); maxY = Math.max(maxY, n.y + s.h);
    }
    const r = viewport.getBoundingClientRect();
    const pad = 80;
    const zoom = Math.min(1.4, Math.max(0.4, Math.min(
      (r.width - pad * 2) / (maxX - minX || 1),
      (r.height - pad * 2) / (maxY - minY || 1))));
    state.zoom = zoom;
    state.pan.x = (r.width  - (maxX + minX) * zoom) / 2;
    state.pan.y = (r.height - (maxY + minY) * zoom) / 2;
    applyWorld(); save();
  };
  document.getElementById("clearBtn").onclick = () => {
    if (!state.nodes.length || confirm("确定清空所有节点和连线？此操作不可撤销。")) {
      state.nodes = []; state.edges = []; selNode = selEdge = null;
      save(); draw(); renderInspector(); toast("已清空");
    }
  };
  document.getElementById("exportBtn").onclick = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "SSCA思路-" + new Date().toISOString().slice(0, 10) + ".json";
    a.click(); URL.revokeObjectURL(a.href); toast("已导出 JSON");
  };
  const fileInput = document.getElementById("fileInput");
  document.getElementById("importBtn").onclick = () => fileInput.click();
  fileInput.onchange = () => {
    const f = fileInput.files[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const d = JSON.parse(reader.result);
        if (!d.nodes) throw new Error("格式不对");
        state = Object.assign({ nextId: 1, pan: { x: 120, y: 90 }, zoom: 1 }, d);
        selNode = selEdge = null; save(); draw(); renderInspector(); toast("已导入");
      } catch (err) { toast("导入失败：文件格式不正确"); }
    };
    reader.readAsText(f); fileInput.value = "";
  };
  const help = document.getElementById("help");
  document.getElementById("helpBtn").onclick = () => help.classList.add("show");
  document.getElementById("helpClose").onclick = () => help.classList.remove("show");
  help.addEventListener("click", e => { if (e.target === help) help.classList.remove("show"); });

  const THEME_KEY = STORE_KEY + "_theme";
  const themeBtn = document.getElementById("themeBtn");
  function applyTheme(dark) {
    document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
    themeBtn.textContent = dark ? "☀️ 白天" : "🌙 黑夜";
    try { localStorage.setItem(THEME_KEY, dark ? "dark" : "light"); } catch (e) {}
  }
  let darkMode = localStorage.getItem(THEME_KEY) === "dark";
  themeBtn.onclick = () => { darkMode = !darkMode; applyTheme(darkMode); toast(darkMode ? "已切换到黑暗模式" : "已切换到明亮模式"); };
  applyTheme(darkMode);

  const mapMgr = document.getElementById("mapMgr");
  const mapList = document.getElementById("mapList");
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
  function loadMaps() { try { return JSON.parse(localStorage.getItem(MAPS_KEY)) || []; } catch (e) { return []; } }
  function saveMaps() { try { localStorage.setItem(MAPS_KEY, JSON.stringify(maps)); } catch (e) {} }
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
  function ensureMaps() {
    maps = loadMaps();
    currentMapId = localStorage.getItem(CUR_KEY);
    if (!maps.length) {
      let old = null;
      try { const o = JSON.parse(localStorage.getItem(STORE_KEY)); if (o && o.nodes && o.nodes.length) old = o; } catch (e) {}
      const id = uid();
      maps = [{ id: id, name: "导图 1" }]; saveMaps();
      try { localStorage.setItem(mapKey(id), JSON.stringify(old || freshState())); } catch (e) {}
      currentMapId = id; localStorage.setItem(CUR_KEY, id);
    }
    if (!currentMapId || !maps.find(m => m.id === currentMapId)) {
      currentMapId = maps[0].id; localStorage.setItem(CUR_KEY, currentMapId);
    }
  }
  function updateMapName() {
    const m = maps.find(x => x.id === currentMapId);
    document.getElementById("mapName").textContent = m ? m.name : "导图";
  }
  function mapStats(id) {
    try { const d = JSON.parse(localStorage.getItem(mapKey(id))); return { n: d && d.nodes ? d.nodes.length : 0, e: d && d.edges ? d.edges.length : 0 }; }
    catch (e) { return { n: 0, e: 0 }; }
  }
  function renderMapList() {
    mapList.innerHTML = maps.map(m => {
      const s = mapStats(m.id), cur = m.id === currentMapId;
      return '<div class="mm-item' + (cur ? " current" : "") + '">' +
        '<div class="mm-info"><div class="mm-name">' + escapeHtml(m.name) + (cur ? ' <span class="cur-tag">当前</span>' : "") + "</div>" +
        '<div class="mm-meta">' + s.n + " 个节点 · " + s.e + " 连线</div></div>" +
        '<div class="mm-actions">' +
        '<button class="btn" data-act="open" data-id="' + m.id + '">' + (cur ? "当前" : "打开") + "</button>" +
        '<button class="btn" data-act="rename" data-id="' + m.id + '">重命名</button>' +
        '<button class="btn danger" data-act="del" data-id="' + m.id + '">删除</button>' +
        "</div></div>";
    }).join("");
  }
  function switchMap(id) {
    if (id === currentMapId) return;
    save();
    currentMapId = id; localStorage.setItem(CUR_KEY, id);
    state = freshState(); load();
    selNode = selEdge = null;
    for (const k in nodeEls) { nodeEls[k].remove(); delete nodeEls[k]; }
    draw(); renderInspector(); updateMapName();
  }
  async function newMap() {
    const def = "导图 " + (maps.length + 1);
    const name = await promptInput("新建导图 · 起个名字", def);
    if (name === null) return;
    const id = uid();
    maps.push({ id: id, name: name.trim() || def }); saveMaps();
    try { localStorage.setItem(mapKey(id), JSON.stringify(freshState())); } catch (e) {}
    switchMap(id); mapMgr.classList.remove("show"); toast("已创建并进入新导图");
  }
  async function renameMap(m) {
    const name = await promptInput("重命名导图", m.name);
    if (name === null) return;
    m.name = name.trim() || m.name; saveMaps(); renderMapList(); updateMapName();
  }
  function deleteMap(m) {
    if (maps.length <= 1) { toast("至少保留一个导图"); return; }
    if (!confirm("确定删除导图「" + m.name + "」？此操作不可撤销。")) return;
    try { localStorage.removeItem(mapKey(m.id)); } catch (e) {}
    const wasCurrent = currentMapId === m.id;
    maps = maps.filter(x => x.id !== m.id); saveMaps();
    if (wasCurrent) {
      currentMapId = maps[0].id; localStorage.setItem(CUR_KEY, currentMapId);
      state = freshState(); load(); selNode = selEdge = null;
      for (const k in nodeEls) { nodeEls[k].remove(); delete nodeEls[k]; }
      draw(); renderInspector(); updateMapName();
    }
    renderMapList(); toast("已删除导图");
  }
  document.getElementById("mapBtn").onclick = () => { renderMapList(); mapMgr.classList.add("show"); };
  document.getElementById("mapMgrClose").onclick = () => mapMgr.classList.remove("show");
  document.getElementById("newMapBtn").onclick = newMap;
  mapMgr.addEventListener("click", e => { if (e.target === mapMgr) mapMgr.classList.remove("show"); });
  mapList.addEventListener("click", e => {
    const btn = e.target.closest("button[data-act]"); if (!btn) return;
    const m = maps.find(x => x.id === btn.dataset.id); if (!m) return;
    if (btn.dataset.act === "open") { switchMap(m.id); mapMgr.classList.remove("show"); }
    else if (btn.dataset.act === "rename") renameMap(m);
    else if (btn.dataset.act === "del") deleteMap(m);
  });

  const inputModal = document.getElementById("inputModal");
  const imInput = document.getElementById("imInput");
  const imTitle = document.getElementById("imTitle");
  let imResolve = null;
  function promptInput(title, def) {
    return new Promise(resolve => {
      imResolve = resolve;
      imTitle.textContent = title;
      imInput.value = def || "";
      inputModal.classList.add("show");
      setTimeout(() => { imInput.focus(); imInput.select(); }, 0);
    });
  }
  function imClose(val) {
    inputModal.classList.remove("show");
    const r = imResolve; imResolve = null;
    if (r) r(val);
  }
  document.getElementById("imOk").onclick = () => imClose(imInput.value);
  document.getElementById("imCancel").onclick = () => imClose(null);
  imInput.addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); imClose(imInput.value); }
    else if (e.key === "Escape") { e.preventDefault(); imClose(null); }
  });
  inputModal.addEventListener("click", e => { if (e.target === inputModal) imClose(null); });

  let toastTimer = null;
  function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove("show"), 1600);
  }

  ensureMaps();
  load();
  applyWorld();
  draw();
  renderInspector();
  updateMapName();
  if (!localStorage.getItem(STORE_KEY + "_seen")) {
    help.classList.add("show"); localStorage.setItem(STORE_KEY + "_seen", "1");
  }
})();
</script>
</body>
</html>
